<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic System Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-[#8FBFE0] flex items-center justify-center min-h-screen text-gray-800"
  >
    <section class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
      <!-- Header -->
      <h1 class="text-3xl font-extrabold text-center text-[#2F5395] mb-6">
        Curaline Login
      </h1>

      <!-- Form -->
      <form id="loginForm" class="space-y-5">
        <!-- Email -->
        <div>
          <label class="block mb-1 font-medium text-[#2F5395]">Email</label>
          <input
            type="email"
            class="w-full border border-[#9FA2B2] rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-[#3EDCDE]"
            placeholder="adminlogin12@outlook.com"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block mb-1 font-medium text-[#2F5395]">Password</label>
          <input
            type="password"
            class="w-full border border-[#9FA2B2] rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-[#3EDCDE]"
            placeholder="********"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-[#2F5395] hover:bg-[#3EDCDE] text-white py-2 rounded-lg transition font-semibold"
        >
          Sign In
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center text-sm text-[#9FA2B2] mt-6">
        Forgot your password?
        <a
          href="https://www.youtube.com/watch?v=xvFZjo5PgG0&list=RDxvFZjo5PgG0&start_radio=1"
          class="text-[#3EDCDE] font-medium hover:underline"
          >Reset here</a
        >
      </p>
    </section>
    <script>
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        window.location.href = "dashboard.html";
      });
    </script>
  </body>
</html>
